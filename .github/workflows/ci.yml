name: CI Build
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install
      
      - name: Build UI module
        run: |
          cd ui
          npm install
          npm run build
      
      - name: Install Functions module
        run: |
          cd functions
          npm install
